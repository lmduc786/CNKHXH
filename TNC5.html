        ];

        let correctCount = 0;
        const quizContainer = document.getElementById('quiz');

        function loadQuiz() {
            quizData.forEach((q, index) => {
                const qCard = document.createElement('div');
                qCard.classList.add('question-card');
                qCard.id = `q-card-${index}`;
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `<div class="option" id="label-${index}-${optIndex}" onclick="checkAnswer(${index}, ${optIndex})">${opt}</div>`;
                });
                qCard.innerHTML = `<div class="question-title">${q.question}</div><div id="options-${index}" class="options-container">${optionsHtml}</div>`;
                quizContainer.appendChild(qCard);
            });
        }

        window.checkAnswer = function(qIdx, selVal) {
            const q = quizData[qIdx];
            const allOptions = document.querySelectorAll(`#options-${qIdx} .option`);
            
            if (allOptions[0].classList.contains('disabled')) return;
            allOptions.forEach(opt => opt.classList.add('disabled'));
            
            if (selVal === q.answer) {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('correct');
                correctCount++;
            } else {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('incorrect');
                document.getElementById(`label-${qIdx}-${q.answer}`).classList.add('correct');
            }

            // Tự động cuộn đến câu tiếp theo sau 600ms
            setTimeout(() => {
                const nextCard = document.getElementById(`q-card-${qIdx + 1}`);
                if (nextCard) {
                    nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 600);
        };

        window.showResult = function() {
            const container = document.getElementById('result-container');
            const scoreText = document.getElementById('score-text');
            const evaluation = document.getElementById('evaluation');
            
            container.style.display = 'block';
            scoreText.innerText = `${correctCount} / ${quizData.length}`;
            
            let percent = (correctCount / quizData.length) * 100;
            if(percent >= 80) evaluation.innerText = "Xuất sắc! Bạn đã sẵn sàng để vượt qua kỳ thi.";
            else if(percent >= 50) evaluation.innerText = "Khá tốt! Nhưng hãy ôn lại các câu sai để chắc chắn hơn.";
            else evaluation.innerText = "Cần cố gắng thêm! Phần cơ cấu xã hội - giai cấp này khá quan trọng đấy.";
            
            container.scrollIntoView({ behavior: 'smooth' });
        };

        loadQuiz();
    </script>
</body>
</html>
