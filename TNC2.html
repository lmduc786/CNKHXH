            { question: "72. Biến đổi của công nhân Việt Nam hiện nay so với đầu thế kỷ XX:", options: ["A. Tăng số lượng chất lượng, đi đầu công nghiệp hóa hiện đại hóa", "B. Đã thành giai cấp lãnh đạo giải phóng dân tộc", "C. Đã thực hiện thành công xây dựng CNXH", "D. Đang phát triển để tiếp tục mục tiêu độc lập dân tộc"], answer: 0 },
            { question: "73. Nhận định KHÔNG đúng về biến đổi công nhân VN hiện nay?", options: ["A. Tăng số lượng chất lượng", "B. Đã thành giai cấp lãnh đạo CM giải phóng dân tộc", "C. Đa dạng cơ cấu nghề nghiệp", "D. Công nhân tri thức nắm khoa học công nghệ"], answer: 1 },
            { question: "74. Sứ mệnh công nhân Việt Nam hiện nay trong lĩnh vực kinh tế?", options: ["A. Đi đầu trong công nghiệp hóa, hiện đại hóa đất nước", "B. Đấu tranh giành độc lập", "C. Giải phóng dân tộc", "D. Đi đầu bảo vệ độc lập"], answer: 0 },
            { question: "75. Sứ mệnh công nhân Việt Nam hiện nay trong lĩnh vực chính trị?", options: ["A. Đi đầu công nghiệp hóa", "B. Đấu tranh giành độc lập", "C. Giải phóng dân tộc", "D. Tăng cường xây dựng Đảng, ngăn chặn suy thoái"], answer: 3 },
            { question: "76. Nhận định KHÔNG đúng với nội dung chính trị của công nhân VN hiện nay?", options: ["A. Tăng cường lãnh đạo của Đảng", "B. Giữ bản chất giai cấp công nhân của Đảng", "C. Chỉnh đốn Đảng, ngăn chặn suy thoái", "D. Đi đầu trong công nghiệp hóa hiện đại hóa"], answer: 3 },
            { question: "77. Nhận định KHÔNG đúng với nội dung văn hóa tư tưởng công nhân VN hiện nay?", options: ["A. Xây dựng văn hóa đậm bản sắc dân tộc", "B. Xây dựng con người mới XHCN", "C. Bảo vệ sự trong sáng của CN Mác-Lênin", "D. Chỉnh đốn Đảng, ngăn chặn suy thoái"], answer: 3 },
            { question: "78. Lựa chọn KHÔNG đúng về sự ra đời Đảng Cộng sản Việt Nam?", options: ["A. Ra đời khi đất nước là thuộc địa", "B. Được thành lập ở Việt Nam", "C. Ra đời năm 1930", "D. Hợp nhất từ 3 tổ chức Cộng sản"], answer: 1 },
            { question: "79. Đảng và Nhà nước ta chủ trương mấy giải pháp xây dựng công nhân hiện nay?", options: ["A. 4", "B. 5", "C. 6", "D. 7"], answer: 1 },
            { question: "80. Nhiệm vụ then chốt công nhân Việt Nam cần thực hiện hiện nay?", options: ["A. Phát triển sản xuất hiện đại", "B. Xây dựng chỉnh đốn Đảng trong sạch vững mạnh", "C. Phát triển kinh tế tri thức", "D. Giữ gìn bản sắc dân tộc"], answer: 1 }
        ];

        let score = 0;
        const quizContainer = document.getElementById('quiz');

        function loadQuiz() {
            quizData.forEach((q, index) => {
                const qCard = document.createElement('div');
                qCard.classList.add('question-card');
                qCard.id = `q-card-${index}`;
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `<div class="option" id="label-${index}-${optIndex}" onclick="checkAnswer(${index}, ${optIndex})">${opt}</div>`;
                });
                qCard.innerHTML = `<div class="question-title">${q.question}</div><div id="options-${index}" class="options-container">${optionsHtml}</div>`;
                quizContainer.appendChild(qCard);
            });
        }

        window.checkAnswer = function(qIdx, selVal) {
            const q = quizData[qIdx];
            const allOptions = document.querySelectorAll(`#options-${qIdx} .option`);
            
            if (allOptions[0].classList.contains('disabled')) return;
            allOptions.forEach(opt => opt.classList.add('disabled'));
            
            if (selVal === q.answer) {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('correct');
                score++;
            } else {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('incorrect');
                document.getElementById(`label-${qIdx}-${q.answer}`).classList.add('correct');
            }

            // Tự động cuộn đến câu tiếp theo sau 600ms
            setTimeout(() => {
                const nextCard = document.getElementById(`q-card-${qIdx + 1}`);
                if (nextCard) {
                    nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 600);
        };

        window.showResult = function() {
            const resContainer = document.getElementById('result-container');
            const scoreText = document.getElementById('score-text');
            const eval = document.getElementById('evaluation');
            
            resContainer.style.display = 'block';
            scoreText.innerText = `${score} / ${quizData.length}`;
            
            const percent = (score / quizData.length) * 100;
            if (percent === 100) eval.innerText = "Tuyệt đối! Bạn là chuyên gia CNXHKH.";
            else if (percent >= 80) eval.innerText = "Rất tốt! Bạn nắm rất chắc về giai cấp công nhân.";
            else if (percent >= 50) eval.innerText = "Tạm đạt, cần chú ý kỹ hơn các đặc điểm công nhân Việt Nam.";
            else eval.innerText = "Cần học lại kỹ hơn để vượt qua kỳ thi nhé!";
            
            resContainer.scrollIntoView({ behavior: 'smooth' });
        };

        loadQuiz();
    </script>
</body>
</html>
