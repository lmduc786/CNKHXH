            { question: "164. Lần đầu nhân dân VN chính thức thực hiện dân chủ lập ra bộ máy nhà nước năm nào? ", options: ["A. 1945", "B. Năm 1946", "C. 1954", "D. 1975"], answer: 1 },
            { question: "165. Vì sao chế độ phong kiến KHÔNG được coi là nền dân chủ? ", options: ["A. Quyền lực thuộc thiểu số bóc lột", "B. Thuộc bộ phận nhân dân", "C. Vì quyền lực nhà nước không thuộc về nhân dân", "D. Thuộc giai cấp thống trị"], answer: 2 },
            { question: "166. Nội dung thể hiện bản chất kinh tế của nền dân chủ xã hội chủ nghĩa? ", options: ["A. Lãnh đạo của công nhân", "B. Chế độ công hữu về những tư liệu sản xuất chủ yếu...", "C. Hệ tư tưởng Mác-Lênin", "D. Sản xuất hiện đại"], answer: 1 },
            { question: "167. Nội dung thể hiện bản chất chính trị của nền dân chủ xã hội chủ nghĩa? ", options: ["A. Sự lãnh đạo của giai cấp công nhân", "B. Chế độ công hữu", "C. Hệ tư tưởng Mác-Lênin", "D. Sản xuất hiện đại"], answer: 0 },
            { question: "168. Nội dung thể hiện bản chất tư tưởng văn hóa – xã hội dân chủ XHCN? ", options: ["A. Lãnh đạo của công nhân", "B. Chế độ công hữu", "C. Chủ nghĩa Mác – Lênin làm chủ đạo...", "D. Giá trị truyền thống"], answer: 2 }
        ];

        let score = 0;
        const quizContainer = document.getElementById('quiz');

        function loadQuiz() {
            quizData.forEach((q, index) => {
                const qCard = document.createElement('div');
                qCard.classList.add('question-card');
                qCard.id = `q-card-${index}`;
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `<div class="option" id="label-${index}-${optIndex}" onclick="checkAnswer(${index}, ${optIndex})">${opt}</div>`;
                });
                qCard.innerHTML = `<div class="question-title">${q.question}</div><div id="options-${index}" class="options-container">${optionsHtml}</div>`;
                quizContainer.appendChild(qCard);
            });
        }

        window.checkAnswer = function(qIdx, selVal) {
            const q = quizData[qIdx];
            const allOptions = document.querySelectorAll(`#options-${qIdx} .option`);
            
            if (allOptions[0].classList.contains('disabled')) return;
            allOptions.forEach(opt => opt.classList.add('disabled'));
            
            if (selVal === q.answer) {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('correct');
                score++;
            } else {
                document.getElementById(`label-${qIdx}-${selVal}`).classList.add('incorrect');
                document.getElementById(`label-${qIdx}-${q.answer}`).classList.add('correct');
            }

            setTimeout(() => {
                const nextCard = document.getElementById(`q-card-${qIdx + 1}`);
                if (nextCard) {
                    nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 600);
        };

        window.showResult = function() {
            const resContainer = document.getElementById('result-container');
            const scoreText = document.getElementById('score-text');
            const eval = document.getElementById('evaluation');
            
            resContainer.style.display = 'block';
            scoreText.innerText = `${score} / ${quizData.length}`;
            
            const percent = (score / quizData.length) * 100;
            if (percent === 100) eval.innerText = "Xuất sắc! Bạn đã nắm vững lý luận về Dân chủ và Nhà nước XHCN.";
            else if (percent >= 80) eval.innerText = "Rất tốt! Bạn hiểu sâu về bản chất Nhà nước pháp quyền VN.";
            else if (percent >= 50) eval.innerText = "Tạm ổn. Hãy lưu ý kỹ sự khác biệt giữa dân chủ trực tiếp và gián tiếp nhé.";
            else eval.innerText = "Phần Dân chủ và Nhà nước khá khó, bạn nên xem lại bài giảng một lần nữa.";
            
            resContainer.scrollIntoView({ behavior: 'smooth' });
        };

        loadQuiz();
    </script>
</body>
</html>
